<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Facilities LogComex — Como usar</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#09001c;font-family:'Sora',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
#wrap{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
#stage{position:relative;width:100%;max-width:600px}
#stage::before{content:'';display:block;padding-top:56.25%}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px}
#ctrl{width:100%;max-width:600px;display:flex;align-items:center;gap:10px}
#pbtn{display:flex;align-items:center;justify-content:center;width:46px;height:46px;min-width:46px;background:#6613D0;border:none;border-radius:50%;cursor:pointer;flex-shrink:0;transition:background .15s}
#pbtn:hover{background:#4e0fa0}
#pbtn:active{transform:scale(.93)}
#pbtn svg{width:18px;height:18px;fill:#fff}
#pw{flex:1;height:6px;background:rgba(255,255,255,0.12);border-radius:3px;cursor:pointer}
#pf{height:100%;width:0%;background:#FF6B2B;border-radius:3px;pointer-events:none;transition:width .1s linear}
#tl{font-size:12px;color:rgba(255,255,255,0.3);min-width:52px;text-align:right}
#mbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;min-width:38px;background:none;border:none;cursor:pointer}
#mbtn svg{width:20px;height:20px}
#hint{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);background:rgba(102,19,208,0.9);color:#fff;font-size:13px;font-family:'Sora',sans-serif;padding:10px 22px;border-radius:22px;pointer-events:none;white-space:nowrap;animation:fh 3.5s ease forwards}
@keyframes fh{0%{opacity:0}10%{opacity:1}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint">▶ Toque para assistir com música</div>
  </div>
  <div id="ctrl">
    <button id="pbtn" onclick="tog()" aria-label="Play">
      <svg id="ip" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="ipa" style="display:none" viewBox="0 0 24 24"><rect x="6" y="3" width="4" height="18" rx="1"/><rect x="14" y="3" width="4" height="18" rx="1"/></svg>
      <svg id="ipr" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>
    </button>
    <div id="pw" onclick="seek(event)"><div id="pf"></div></div>
    <span id="tl">0s / 50s</span>
    <button id="mbtn" onclick="toggleMute()" aria-label="Som">
      <svg id="ms" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="rgba(255,255,255,0.55)" stroke="none"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <svg id="mm" style="display:none" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="rgba(255,255,255,0.2)" stroke="none"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── Canvas ────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const W = 600, H = 338, DUR = 50000;
cv.width = W; cv.height = H;

let T=0, playing=false, prev=null, raf=null, muted=false;
let ac=null, masterGain=null, musicNodes=[];

// ── MÚSICA GENERATIVA ─────────────────────────────────────────
// Escala pentatônica de Lá menor: A C D E G
// Soa suave, positiva, sem dissonância — perfeita para tutorial

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ac.createGain();
  masterGain.gain.value = 0.55;
  masterGain.connect(ac.destination);
}

function nota(freq, start, dur, vol, type) {
  if (!ac || muted) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  const fil = ac.createBiquadFilter();
  fil.type = 'lowpass';
  fil.frequency.value = 2200;
  o.connect(fil); fil.connect(g); g.connect(masterGain);
  o.type = type || 'triangle';
  o.frequency.value = freq;
  const t = ac.currentTime + start;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.04);
  g.gain.setValueAtTime(vol, t + dur * 0.7);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t);
  o.stop(t + dur + 0.05);
  musicNodes.push(o);
}

function pad(freq, start, dur, vol) {
  if (!ac || muted) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  const fil = ac.createBiquadFilter();
  fil.type = 'lowpass'; fil.frequency.value = 800;
  o.connect(fil); fil.connect(g); g.connect(masterGain);
  o.type = 'sine';
  o.frequency.value = freq;
  const t = ac.currentTime + start;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.5);
  g.gain.setValueAtTime(vol, t + dur - 0.5);
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.start(t); o.stop(t + dur + 0.1);
  musicNodes.push(o);
}

function kick(start) {
  if (!ac || muted) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = 'sine';
  o.frequency.setValueAtTime(120, ac.currentTime + start);
  o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + start + 0.15);
  g.gain.setValueAtTime(0.4, ac.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + 0.25);
  o.start(ac.currentTime + start);
  o.stop(ac.currentTime + start + 0.3);
  musicNodes.push(o);
}

function hihat(start, vol) {
  if (!ac || muted) return;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  const g = ac.createGain();
  const fil = ac.createBiquadFilter();
  fil.type = 'highpass'; fil.frequency.value = 6000;
  src.buffer = buf;
  src.connect(fil); fil.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol||0.06, ac.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + 0.05);
  src.start(ac.currentTime + start);
  musicNodes.push(src);
}

// Escala pentatônica Am: A2 C3 D3 E3 G3 A3 C4 D4 E4 G4 A4
const notas = {
  A2:110, C3:130.8, D3:146.8, E3:164.8, G3:196,
  A3:220, C4:261.6, D4:293.7, E4:329.6, G4:392, A4:440,
  C5:523.3, E5:659.3, G5:784
};

function tocarMusica() {
  if (!ac || muted) return;
  stopMusic();

  // BPM 88 — leve, positivo, moderno
  const bpm = 88;
  const beat = 60 / bpm;      // 0.682s por beat
  const bar = beat * 4;       // 2.727s por compasso
  const total = 50;           // segundos totais

  // ── INTRO (compassos 0-3): apenas pad e melodia suave ──
  pad(notas.A2, 0, bar*4, 0.08);
  pad(notas.E3, 0, bar*4, 0.06);
  pad(notas.A3, 0, bar*4, 0.04);

  // Melodia intro — arpejo ascendente suave
  [[0,notas.A3,0.3],[beat*.5,notas.C4,0.28],[beat,notas.D4,0.3],[beat*1.5,notas.E4,0.32],
   [beat*2,notas.G4,0.3],[beat*2.5,notas.A4,0.28],[beat*3,notas.E4,0.25],[beat*3.5,notas.D4,0.22]
  ].forEach(([s,f,v]) => nota(f,s,beat*.9,v));

  // Repete arpejo com variação
  [[bar,notas.C4,0.3],[bar+beat*.5,notas.E4,0.28],[bar+beat,notas.G4,0.3],[bar+beat*1.5,notas.A4,0.32],
   [bar+beat*2,notas.G4,0.25],[bar+beat*2.5,notas.E4,0.22],[bar+beat*3,notas.D4,0.25],[bar+beat*3.5,notas.C4,0.2]
  ].forEach(([s,f,v]) => nota(f,s,beat*.9,v));

  // ── CORPO (compassos 4 em diante): entra ritmo ──
  for (let i = 0; i < Math.floor(total/bar)-2; i++) {
    const t0 = bar*2 + i*bar;

    // Kick no 1 e 3
    kick(t0);
    kick(t0 + beat*2);

    // Hihat no 2 e 4
    hihat(t0 + beat, 0.07);
    hihat(t0 + beat*3, 0.07);
    hihat(t0 + beat*.5, 0.04);
    hihat(t0 + beat*1.5, 0.04);
    hihat(t0 + beat*2.5, 0.04);
    hihat(t0 + beat*3.5, 0.04);

    // Pad de fundo — alternando harmonias Am / C / G / Em
    const chords = [
      [notas.A2, notas.E3, notas.A3],
      [notas.C3, notas.G3, notas.C4],
      [notas.G2||98, notas.D3, notas.G3],
      [notas.E3*.5||82, notas.B3||246.9, notas.E4*.5||164.8],
    ];
    const ch = chords[i % chords.length];
    ch.forEach((f,j) => pad(f, t0, bar, 0.055 - j*0.01));

    // Melodia principal — frases de 2 compassos
    if (i % 2 === 0) {
      const melodias = [
        [[0,notas.E4],[beat*.5,notas.G4],[beat,notas.A4],[beat*1.5,notas.G4],[beat*2,notas.E4],[beat*2.5,notas.D4],[beat*3,notas.C4],[beat*3.5,notas.D4]],
        [[0,notas.C4],[beat*.5,notas.E4],[beat,notas.G4],[beat*1.5,notas.A4],[beat*2,notas.G4],[beat*2.5,notas.E4],[beat*3,notas.G4],[beat*3.5,notas.E4]],
        [[0,notas.A3],[beat*.5,notas.C4],[beat,notas.E4],[beat*1.5,notas.D4],[beat*2,notas.C4],[beat*2.5,notas.D4],[beat*3,notas.E4],[beat*3.5,notas.G4]],
      ];
      const mel = melodias[(i/2) % melodias.length];
      mel.forEach(([s,f]) => nota(f, t0+s, beat*.8, 0.18));
    } else {
      // Contra-melodia mais suave
      [[beat*.25,notas.G4],[beat,notas.E4],[beat*1.75,notas.D4],[beat*2.5,notas.C4],[beat*3,notas.E4]].forEach(([s,f]) => nota(f,t0+s,beat*.6,0.1));
    }

    // Baixo simples
    nota(notas.A2, t0, beat*1.8, 0.12, 'sine');
    nota(notas.A2, t0+beat*2, beat*1.8, 0.12, 'sine');
  }

  // ── OUTRO (últimos 5s): fade out gradual já no masterGain ──
  if (masterGain) {
    masterGain.gain.setValueAtTime(0.55, ac.currentTime + 42);
    masterGain.gain.linearRampToValueAtTime(0, ac.currentTime + 50);
  }
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
  if (masterGain) {
    masterGain.gain.cancelScheduledValues(0);
    masterGain.gain.value = 0.55;
  }
}

function toggleMute() {
  muted = !muted;
  if (muted) { stopMusic(); if(masterGain) masterGain.gain.value=0; }
  else { if(masterGain) masterGain.gain.value=0.55; if(playing) tocarMusica(); }
  document.getElementById('ms').style.display = muted ? 'none' : 'block';
  document.getElementById('mm').style.display = muted ? 'block' : 'none';
}

// ── Utilitários de desenho ────────────────────────────────────
const cl = (v,a,b) => Math.max(a,Math.min(b,v));
const ez = t => t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const fi = (s,d,t) => ez(cl((t-s)/d,0,1));
const lp = (a,b,t) => a+(b-a)*t;

function rr(x,y,w,h,r,fill,stroke,lw) {
  cx.beginPath(); cx.roundRect(x,y,w,h,r);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1.5;cx.stroke();}
}
function txt(s,x,y,sz,cor,al,peso) {
  cx.font=`${peso||400} ${sz}px 'Sora',sans-serif`;
  cx.fillStyle=cor; cx.textAlign=al||'center'; cx.textBaseline='middle';
  cx.fillText(s,x,y);
}
function pill(x,y,label,a) {
  cx.globalAlpha=a;
  rr(x-64,y-14,128,28,14,'rgba(102,19,208,0.55)');
  txt(label,x,y,11,'#d4b4ff','center',600);
  cx.globalAlpha=1;
}
function pessoa(px,py,s,cor,lbl,a) {
  cx.globalAlpha=a;
  cx.fillStyle=cor;
  cx.beginPath(); cx.arc(px,py-14*s,13*s,0,6.28); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.82)';
  cx.beginPath(); cx.arc(px-4*s,py-16*s,2.5*s,0,6.28); cx.fill();
  cx.beginPath(); cx.arc(px+4*s,py-16*s,2.5*s,0,6.28); cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.82)'; cx.lineWidth=1.5*s;
  cx.beginPath(); cx.arc(px,py-11*s,5*s,0,Math.PI); cx.stroke();
  rr(px-13*s,py+1*s,26*s,32*s,8*s,cor);
  if(lbl) txt(lbl,px,py+48*s,10,'rgba(255,255,255,0.5)','center');
  cx.globalAlpha=1;
}
function celular(px,py,a) {
  cx.globalAlpha=a;
  rr(px-35,py-66,70,132,12,'#1a0042','rgba(255,255,255,0.12)');
  rr(px-27,py-55,54,96,7,'#09001a');
  rr(px-22,py-49,44,10,5,'rgba(102,19,208,0.7)');
  [0,16,34,52,70].forEach(dy=>rr(px-22,py-33+dy,38,7,2,'rgba(255,255,255,0.18)'));
  cx.globalAlpha=1;
}
function check(qx,qy,a) {
  cx.globalAlpha=a;
  cx.beginPath(); cx.arc(qx,qy,22,0,6.28); cx.fillStyle='#16a34a'; cx.fill();
  cx.strokeStyle='#fff'; cx.lineWidth=3; cx.lineCap='round'; cx.lineJoin='round';
  cx.beginPath(); cx.moveTo(qx-10,qy); cx.lineTo(qx-2,qy+8); cx.lineTo(qx+10,qy-8); cx.stroke();
  cx.globalAlpha=1;
}
function sino(bx,by,a) {
  cx.globalAlpha=a; cx.fillStyle='#FF6B2B';
  cx.beginPath(); cx.arc(bx,by-7,14,Math.PI,0);
  cx.lineTo(bx+14,by+8); cx.lineTo(bx-14,by+8); cx.closePath(); cx.fill();
  cx.beginPath(); cx.arc(bx,by+10,5,0,Math.PI); cx.fill();
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(bx+11,by-18,5,0,6.28); cx.fill();
  cx.fillStyle='#dc2626'; cx.beginPath(); cx.arc(bx+11,by-18,3.5,0,6.28); cx.fill();
  cx.globalAlpha=1;
}
function envelope(bx,by,a) {
  cx.globalAlpha=a;
  rr(bx-36,by-22,72,44,6,'rgba(255,107,43,0.2)','rgba(255,107,43,0.5)');
  cx.strokeStyle='rgba(255,107,43,0.55)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(bx-34,by-20); cx.lineTo(bx,by+4); cx.lineTo(bx+34,by-20); cx.stroke();
  cx.globalAlpha=1;
}
function numCard(x,y,num,label,a) {
  cx.globalAlpha=a;
  rr(x-58,y-38,116,76,10,'rgba(102,19,208,0.28)','rgba(102,19,208,0.45)');
  txt(num,x,y-8,26,'#fff','center',700);
  txt(label,x,y+22,10,'rgba(255,255,255,0.55)','center',500);
  cx.globalAlpha=1;
}

const categorias = [
  {e:'🔧',l:'Manutenção', c:'rgba(102,19,208,0.5)'},
  {e:'📦',l:'Suprimentos',c:'rgba(255,107,43,0.45)'},
  {e:'🎁',l:'Brindes',    c:'rgba(22,163,74,0.4)'},
  {e:'🚚',l:'Logística',  c:'rgba(59,130,246,0.4)'},
  {e:'🔑',l:'Acessos',    c:'rgba(234,179,8,0.4)'},
  {e:'🧹',l:'Limpeza',    c:'rgba(236,72,153,0.4)'},
];

const cenas = [0,10000,18000,28000,38000];
let ultimaCena = -1;

function fundo() {
  cx.fillStyle='#09001c'; cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(255,255,255,0.2)';
  [[55,22],[130,65],[310,15],[470,50],[590,28],[190,150],[530,130],[85,175],[620,175],[250,85],[400,100]].forEach(([a,b])=>{
    cx.beginPath(); cx.arc(a,b,.9,0,6.28); cx.fill();
  });
}

// ── DRAW ──────────────────────────────────────────────────────
function draw(T) {
  fundo();

  const cIdx = cenas.reduce((acc,s,i) => T>=s?i:acc, 0);
  if (cIdx !== ultimaCena) ultimaCena = cIdx;

  // ══ CENA 1 — Boas-vindas (0–10s) ══════════════════════════
  if (T < 10600) {
    const fo = T > 9200 ? 1-fi(9200,900,T) : 1;
    cx.globalAlpha = fi(0,600,T)*fo;
    txt('Facilities',W/2,H/2-54,32,'#ffffff','center',700);
    cx.globalAlpha = fi(400,600,T)*fo;
    txt('LogComex',W/2,H/2-12,32,'#FF6B2B','center',400);
    cx.globalAlpha = fi(900,600,T)*fo;
    txt('Central de Chamados',W/2,H/2+34,14,'rgba(255,255,255,0.5)');
    cx.globalAlpha = fi(1500,700,T)*fo;
    txt('Simples, rápido e no seu Slack',W/2,H/2+62,12,'rgba(255,255,255,0.3)');
    const pr = fi(2000,2000,T)*fo;
    if(pr>0){cx.globalAlpha=pr*.07;cx.strokeStyle='#6613D0';cx.lineWidth=2;cx.beginPath();cx.arc(W/2,H/2-32,80+pr*28,0,6.28);cx.stroke();}
    cx.globalAlpha=1;
  }

  // ══ CENA 2 — Dados reais (10–18s) ═════════════════════════
  if (T>=9600 && T<18600) {
    const lt=T-10000, fo=T>17300?1-fi(17300,900,T):1;
    pill(W/2,28,'NOSSOS NÚMEROS',fi(0,500,lt)*fo);
    cx.globalAlpha=fi(300,500,lt)*fo;
    txt('Resultados do time de Facilities em 2025',W/2,62,13,'rgba(255,255,255,0.65)');
    numCard(W/2-130,H/2+10,'1.518','chamados recebidos', fi(600,600,lt)*fo);
    numCard(W/2,    H/2+10,'1.382','chamados resolvidos',fi(900,600,lt)*fo);
    numCard(W/2+130,H/2+10,'98%', 'dentro do prazo',    fi(1200,600,lt)*fo);
    cx.globalAlpha=fi(1900,600,lt)*fo;
    txt('O time está aqui pra te ajudar!',W/2,H/2+76,12,'rgba(255,255,255,0.4)');
    cx.globalAlpha=1;
  }

  // ══ CENA 3 — Login (18–28s) ════════════════════════════════
  if (T>=17600 && T<28600) {
    const lt=T-18000, fo=T>27300?1-fi(27300,900,T):1;
    pill(W/2,28,'PASSO 1 — ENTRAR NO SISTEMA',fi(0,500,lt)*fo);
    cx.globalAlpha=fi(300,500,lt)*fo;
    txt('Use seu e-mail @logcomex.com',W/2,64,15,'#ffffff','center',600);
    cx.globalAlpha=fi(550,400,lt)*fo;
    txt('Clique em Entrar com Google — sem senha!',W/2,86,12,'rgba(255,255,255,0.45)');
    const pX = lp(W/2-50, W/2-90, ez(fi(800,1000,lt)));
    pessoa(pX,H/2+8,1.05,'#6613D0','Você',fi(700,500,lt)*fo);
    celular(W/2+82,H/2-2,fi(900,500,lt)*fo);
    cx.globalAlpha=fi(1300,500,lt)*fo;
    cx.strokeStyle='rgba(255,107,43,0.5)'; cx.lineWidth=2; cx.setLineDash([5,5]);
    cx.beginPath(); cx.moveTo(W/2-46,H/2-10); cx.lineTo(W/2+46,H/2-10); cx.stroke(); cx.setLineDash([]);
    cx.globalAlpha=fi(1700,600,lt)*fo;
    rr(W/2-148,H/2+82,296,30,8,'rgba(102,19,208,0.3)');
    txt('Nome e centro de custo preenchidos automaticamente  ✓',W/2,H/2+97,11,'#c9a0ff','center',500);
    cx.globalAlpha=1;
  }

  // ══ CENA 4 — Categorias (28–38s) ══════════════════════════
  if (T>=27600 && T<38600) {
    const lt=T-28000, fo=T>37300?1-fi(37300,900,T):1;
    pill(W/2,28,'PASSO 2 — ESCOLHA A CATEGORIA',fi(0,500,lt)*fo);
    cx.globalAlpha=fi(300,500,lt)*fo;
    txt('O que você precisa hoje?',W/2,64,15,'#ffffff','center',600);
    categorias.forEach((cat,i) => {
      const col=i%3, row=Math.floor(i/3);
      const bx=W/2-120+col*120, by=H/2-22+row*76;
      cx.globalAlpha=fi(600+i*170,400,lt)*fo;
      rr(bx-52,by-23,104,50,10,cat.c,'rgba(255,255,255,0.07)');
      cx.font='20px sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText(cat.e,bx,by-4);
      txt(cat.l,bx,by+16,11,'rgba(255,255,255,0.9)','center',500);
    });
    cx.globalAlpha=1;
  }

  // ══ CENA 5 — Formulário (38–44s) ══════════════════════════
  if (T>=37600 && T<44600) {
    const lt=T-38000, fo=T>43300?1-fi(43300,900,T):1;
    pill(W/2,28,'PASSO 3 — PREENCHA E ENVIE',fi(0,500,lt)*fo);
    cx.globalAlpha=fi(300,500,lt)*fo;
    txt('Descreva o que você precisa com detalhes',W/2,64,15,'#ffffff','center',600);
    cx.globalAlpha=fi(600,400,lt)*fo;
    rr(W/2-162,84,324,198,12,'rgba(255,255,255,0.04)','rgba(255,255,255,0.07)');
    [{l:'Nome',v:'João Faria',ok:true},{l:'Centro de custo',v:'Financeiro Corporate',ok:true},
     {l:'Descrição',v:'Preciso de teclado novo...'},{l:'Data desejada',v:'28/05/2026'}
    ].forEach((f,i) => {
      cx.globalAlpha=fi(700+i*220,420,lt)*fo;
      const fy=100+i*44;
      txt(f.l,W/2-152,fy,10,'rgba(255,255,255,0.4)','left');
      rr(W/2-152,fy+9,304,26,5,f.ok?'rgba(102,19,208,0.3)':'rgba(255,255,255,0.05)','rgba(255,255,255,0.1)');
      txt(f.v,W/2-144,fy+22,11,f.ok?'#c9a0ff':'rgba(255,255,255,0.65)','left');
    });
    const bp=fi(2900,600,lt)*fo;
    cx.globalAlpha=bp;
    const bs=1+fi(2900,200,lt)*0.04;
    cx.save(); cx.translate(W/2,292); cx.scale(bs,bs); cx.translate(-W/2,-292);
    rr(W/2-66,280,132,28,8,'#6613D0');
    txt('Enviar chamado',W/2,294,12,'#fff','center',600);
    cx.restore();
    cx.globalAlpha=1;
  }

  // ══ CENA 6 — Slack (44–50s) ════════════════════════════════
  if (T>=43600) {
    const lt=T-44000;
    pill(W/2,28,'PRONTO — ACOMPANHE PELO SLACK',fi(0,500,lt));
    cx.globalAlpha=fi(300,500,lt);
    txt('Você recebe tudo direto nas suas mensagens',W/2,64,15,'#ffffff','center',600);
    pessoa(W/2,H/2+12,1.12,'#6613D0','Você',fi(400,600,lt));
    const sinoX=lp(W/2+180,W/2+96,ez(fi(700,800,lt)));
    sino(sinoX,H/2-46,fi(650,600,lt));
    const envX=lp(W/2-180,W/2-86,ez(fi(900,800,lt)));
    envelope(envX,H/2-46,fi(800,600,lt));
    check(W/2,H/2-48,fi(1800,600,lt));
    cx.globalAlpha=fi(2200,600,lt);
    rr(W/2-148,H/2+76,296,26,7,'rgba(255,107,43,0.2)','rgba(255,107,43,0.4)');
    txt('Chamado concluído! Toque para avaliar  ⭐',W/2,H/2+89,11,'rgba(255,107,43,0.9)','center',500);
    cx.globalAlpha=fi(3000,700,lt);
    rr(W/2-148,H/2+108,296,26,7,'rgba(22,163,74,0.2)','rgba(22,163,74,0.45)');
    txt('Rastreio enviado — seu pacote está a caminho!  📦',W/2,H/2+121,11,'rgba(134,239,172,0.9)','center',500);
    cx.globalAlpha=fi(4000,900,lt);
    txt('facilities-api.vercel.app',W/2,H-20,14,'#FF6B2B','center',600);
    cx.globalAlpha=1;
  }

  document.getElementById('pf').style.width = Math.min(T/DUR*100,100)+'%';
  document.getElementById('tl').textContent = Math.floor(T/1000)+'s / 50s';
}

// ── Loop ──────────────────────────────────────────────────────
function loop(ts) {
  if (!prev) prev=ts;
  T=Math.min(T+(ts-prev),DUR); prev=ts; draw(T);
  if (T<DUR && playing) raf=requestAnimationFrame(loop);
  else if (T>=DUR) {
    playing=false; stopMusic();
    document.getElementById('ip').style.display='none';
    document.getElementById('ipa').style.display='none';
    document.getElementById('ipr').style.display='block';
  }
}

function tog() {
  initAudio();
  if (T>=DUR) {
    T=0; ultimaCena=-1;
    document.getElementById('ipr').style.display='none';
  }
  playing=!playing;
  document.getElementById('ip').style.display=playing?'none':'block';
  document.getElementById('ipa').style.display=playing?'block':'none';
  if (playing) { prev=null; raf=requestAnimationFrame(loop); if(!muted) tocarMusica(); }
  else { cancelAnimationFrame(raf); stopMusic(); }
}

function seek(e) {
  initAudio();
  const r=e.currentTarget.getBoundingClientRect();
  T=Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*DUR);
  ultimaCena=-1;
  stopMusic();
  draw(T);
  if (playing && !muted) tocarMusica();
}

window.addEventListener('load',()=>draw(0));
</script>
