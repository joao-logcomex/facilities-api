<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Facilities LogComex — Como usar</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0a001f;font-family:'Sora',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}
#wrap{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px;}
#stage{position:relative;width:100%;max-width:600px;}
#stage::before{content:'';display:block;padding-top:56.25%;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;}
#controls{width:100%;max-width:600px;display:flex;align-items:center;gap:10px;}
#playbtn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;min-width:44px;background:#6613D0;border:none;border-radius:50%;cursor:pointer;flex-shrink:0;transition:background .2s;}
#playbtn:hover{background:#4e0fa0;}
#playbtn:active{transform:scale(.94);}
#playbtn svg{width:18px;height:18px;fill:#fff;}
#pbarwrap{flex:1;height:6px;background:rgba(255,255,255,0.12);border-radius:3px;cursor:pointer;}
#pfill{height:100%;width:0%;background:#FF6B2B;border-radius:3px;pointer-events:none;}
#tlbl{font-size:12px;color:rgba(255,255,255,0.35);min-width:50px;text-align:right;}
#voicebtn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;min-width:36px;background:none;border:none;cursor:pointer;}
#voicebtn svg{width:20px;height:20px;}
.subbar{width:100%;max-width:600px;min-height:38px;background:rgba(0,0,0,0.4);border-radius:8px;display:flex;align-items:center;justify-content:center;padding:6px 16px;}
.subbar p{font-size:13px;color:rgba(255,255,255,0.88);text-align:center;line-height:1.45;}
#hint{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:rgba(102,19,208,0.85);color:#fff;font-size:13px;font-family:'Sora',sans-serif;padding:10px 22px;border-radius:22px;pointer-events:none;white-space:nowrap;animation:fh 3.2s ease forwards;}
@keyframes fh{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0;display:none;}}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint">▶ Toque para iniciar com voz</div>
  </div>
  <div id="controls">
    <button id="playbtn" onclick="tog()" aria-label="Play">
      <svg id="ip" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="ipa" style="display:none" viewBox="0 0 24 24"><rect x="6" y="3" width="4" height="18" rx="1"/><rect x="14" y="3" width="4" height="18" rx="1"/></svg>
      <svg id="ipr" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>
    </button>
    <div id="pbarwrap" onclick="seek(event)"><div id="pfill"></div></div>
    <span id="tlbl">0s / 30s</span>
    <button id="voicebtn" onclick="toggleVoice()" aria-label="Voz">
      <svg id="isnd" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="rgba(255,255,255,0.55)" stroke="none"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <svg id="imute" style="display:none" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="rgba(255,255,255,0.2)" stroke="none"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
  </div>
  <div class="subbar"><p id="sub">&nbsp;</p></div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=600,H=338,DUR=30000;
cv.width=W;cv.height=H;

let T=0,playing=false,prev=null,raf=null,voiceOn=true,lastSpoken=-1,lastScene=-1,ac=null;

const narrations=[
  {at:100, text:'Bem-vindo à Central de Chamados Facilities LogComex! Resolva qualquer necessidade do escritório em minutos.'},
  {at:6100, text:'Passo um. Acesse o sistema com seu e-mail LogComex. Clique em Entrar com Google e seus dados já aparecem automaticamente!'},
  {at:12100, text:'Passo dois. Escolha a categoria do seu chamado: Manutenção, Suprimentos, Brindes, Logística e muito mais.'},
  {at:18100, text:'Passo três. Preencha o formulário com sua solicitação e envie. Quanto mais detalhes, mais rápida a resolução!'},
  {at:24100, text:'Pronto! Acompanhe tudo pelo Slack. Para envios DHL, o código de rastreio chega direto na sua mensagem. Bom trabalho!'},
];

function speak(text){
  if(!voiceOn||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='pt-BR';u.rate=1.05;u.pitch=1.0;u.volume=1.0;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang==='pt-BR'&&v.name.toLowerCase().includes('female'))
    ||vs.find(v=>v.lang==='pt-BR')
    ||vs.find(v=>v.lang.startsWith('pt'));
  if(v)u.voice=v;
  document.getElementById('sub').textContent=text;
  window.speechSynthesis.speak(u);
}

function checkNarr(T){
  if(!playing)return;
  for(let i=narrations.length-1;i>=0;i--){
    if(T>=narrations[i].at&&lastSpoken<i){
      lastSpoken=i;speak(narrations[i].text);break;
    }
  }
}

function toggleVoice(){
  voiceOn=!voiceOn;
  if(!voiceOn){window.speechSynthesis?.cancel();document.getElementById('sub').textContent='\u00a0';}
  document.getElementById('isnd').style.display=voiceOn?'block':'none';
  document.getElementById('imute').style.display=voiceOn?'none':'block';
}

function initAudio(){if(ac)return;try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(f,d,vol,type,delay){
  if(!ac||!voiceOn)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type||'sine';o.frequency.value=f;
  const t=ac.currentTime+(delay||0);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||.05,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.start(t);o.stop(t+d+.05);
}
function sceneSound(s){
  if(!ac||!voiceOn)return;
  if(s===0){beep(880,.12,.05,'sine',0);beep(1100,.12,.05,'sine',.13);beep(1320,.25,.07,'sine',.26);}
  else if(s<4){beep(660,.1,.04,'sine',0);beep(880,.15,.05,'sine',.1);}
  else{[523,659,784,1047].forEach((f,i)=>beep(f,.1,.05,'sine',i*.08));}
}

const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const ez=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const fi=(s,d,t)=>ez(cl((t-s)/d,0,1));
function rr(x,y,w,h,r,fill,stroke,lw){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1.5;ctx.stroke();}
}
function txt(s,x,y,sz,col,al,wt){
  ctx.font=`${wt||400} ${sz}px 'Sora',sans-serif`;
  ctx.fillStyle=col;ctx.textAlign=al||'center';ctx.textBaseline='middle';
  ctx.fillText(s,x,y);
}
function pill(x,y,label,a){
  ctx.globalAlpha=a;
  rr(x-58,y-13,116,26,13,'rgba(102,19,208,0.55)');
  txt(label,x,y,11,'#d4b4ff','center',600);
  ctx.globalAlpha=1;
}
function person(px,py,s,col,lbl,a){
  ctx.globalAlpha=a;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(px,py-13*s,13*s,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath();ctx.arc(px-4*s,py-15*s,2.5*s,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(px+4*s,py-15*s,2.5*s,0,6.28);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5*s;
  ctx.beginPath();ctx.arc(px,py-10*s,5*s,0,Math.PI);ctx.stroke();
  rr(px-13*s,py+1*s,26*s,32*s,8*s,col);
  if(lbl)txt(lbl,px,py+46*s,10,'rgba(255,255,255,0.5)','center');
  ctx.globalAlpha=1;
}
function phone(px,py,a){
  ctx.globalAlpha=a;
  rr(px-34,py-62,68,124,11,'#1a0040','rgba(255,255,255,0.12)');
  rr(px-26,py-52,52,90,7,'#09001a');
  rr(px-20,py-46,40,9,4,'rgba(102,19,208,0.7)');
  [0,16,32,50].forEach(dy=>rr(px-20,py-31+dy,36,6,2,'rgba(255,255,255,0.18)'));
  ctx.globalAlpha=1;
}
function checkmark(cx,cy,a){
  ctx.globalAlpha=a;
  ctx.beginPath();ctx.arc(cx,cy,20,0,6.28);ctx.fillStyle='#16a34a';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(cx-9,cy);ctx.lineTo(cx-2,cy+7);ctx.lineTo(cx+9,cy-7);ctx.stroke();
  ctx.globalAlpha=1;
}
function bellIcon(bx,by,a){
  ctx.globalAlpha=a;ctx.fillStyle='#FF6B2B';
  ctx.beginPath();ctx.arc(bx,by-7,13,Math.PI,0);
  ctx.lineTo(bx+13,by+7);ctx.lineTo(bx-13,by+7);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(bx,by+9,4.5,0,Math.PI);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx+10,by-17,4.5,0,6.28);ctx.fill();
  ctx.fillStyle='#FF6B2B';ctx.beginPath();ctx.arc(bx+10,by-17,3,0,6.28);ctx.fill();
  ctx.globalAlpha=1;
}

const cats=[
  {e:'🔧',l:'Manutencao',c:'rgba(102,19,208,0.5)'},
  {e:'📦',l:'Suprimentos',c:'rgba(255,107,43,0.45)'},
  {e:'🎁',l:'Brindes',c:'rgba(22,163,74,0.4)'},
  {e:'🚚',l:'Logistica',c:'rgba(59,130,246,0.4)'},
  {e:'🔑',l:'Acessos',c:'rgba(234,179,8,0.4)'},
  {e:'🧹',l:'Limpeza',c:'rgba(236,72,153,0.4)'},
];

const sceneTimes=[0,6000,12000,18000,24000];

function bgDraw(){
  ctx.fillStyle='#0a001f';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.28)';
  [[55,22],[130,65],[310,15],[470,50],[590,28],[190,150],[530,130],[85,175],[620,175],[250,85],[400,100]].forEach(([a,b])=>{
    ctx.beginPath();ctx.arc(a,b,.9,0,6.28);ctx.fill();
  });
}

function draw(T){
  bgDraw();

  const scIdx=sceneTimes.reduce((acc,s,i)=>T>=s?i:acc,0);
  if(scIdx!==lastScene&&playing){sceneSound(scIdx);lastScene=scIdx;}
  if(playing)checkNarr(T);

  // CENA 1 — Intro (0-6s)
  if(T<6400){
    const fo=T>5300?1-fi(5300,800,T):1;
    ctx.globalAlpha=fi(0,500,T)*fo;
    txt('Facilities',W/2,H/2-52,30,'#ffffff','center',700);
    ctx.globalAlpha=fi(280,500,T)*fo;
    txt('LogComex',W/2,H/2-12,30,'#FF6B2B','center',400);
    ctx.globalAlpha=fi(680,500,T)*fo;
    txt('Central de Chamados',W/2,H/2+32,14,'rgba(255,255,255,0.5)');
    ctx.globalAlpha=fi(1100,600,T)*fo;
    txt('Resolva qualquer necessidade do escritorio',W/2,H/2+60,12,'rgba(255,255,255,0.3)');
    txt('em poucos minutos',W/2,H/2+78,12,'rgba(255,255,255,0.3)');
    const pr=fi(1600,1200,T)*fo;
    if(pr>0){ctx.globalAlpha=pr*.1;ctx.strokeStyle='#6613D0';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(W/2,H/2-32,70+pr*25,0,6.28);ctx.stroke();}
    ctx.globalAlpha=1;
  }

  // CENA 2 — Login (6-12s)
  if(T>=5600&&T<12400){
    const lt=T-6000,fo=T>11300?1-fi(11300,800,T):1;
    pill(W/2,30,'PASSO 1',fi(0,500,lt)*fo);
    ctx.globalAlpha=fi(200,500,lt)*fo;txt('Acesse com seu e-mail @logcomex.com',W/2,62,16,'#ffffff','center',600);
    ctx.globalAlpha=fi(420,400,lt)*fo;txt('Login com Google — sem senha!',W/2,84,12,'rgba(255,255,255,0.45)');
    person(W/2-88,H/2+10,1.05,'#6613D0','Voce',fi(500,500,lt)*fo);
    phone(W/2+80,H/2,fi(620,500,lt)*fo);
    ctx.globalAlpha=fi(950,500,lt)*fo;
    ctx.strokeStyle='rgba(255,107,43,0.5)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(W/2-46,H/2-12);ctx.lineTo(W/2+46,H/2-12);ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=fi(1200,500,lt)*fo;
    rr(W/2-128,H/2+86,256,28,8,'rgba(102,19,208,0.35)');
    txt('Nome e centro de custo automaticos!',W/2,H/2+100,11,'#c9a0ff','center',500);
    ctx.globalAlpha=1;
  }

  // CENA 3 — Categorias (12-18s)
  if(T>=11600&&T<18400){
    const lt=T-12000,fo=T>17300?1-fi(17300,800,T):1;
    pill(W/2,30,'PASSO 2',fi(0,500,lt)*fo);
    ctx.globalAlpha=fi(200,500,lt)*fo;txt('Escolha a categoria do chamado',W/2,62,16,'#ffffff','center',600);
    cats.forEach((c,i)=>{
      const col=i%3,row=Math.floor(i/3),cx=W/2-120+col*120,cy=H/2-22+row*76;
      ctx.globalAlpha=fi(600+i*160,350,lt)*fo;
      rr(cx-50,cy-22,100,48,10,c.c,'rgba(255,255,255,0.07)');
      ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.e,cx,cy-3);
      txt(c.l,cx,cy+16,11,'rgba(255,255,255,0.85)','center',500);
    });
    ctx.globalAlpha=1;
  }

  // CENA 4 — Formulário (18-24s)
  if(T>=17600&&T<24400){
    const lt=T-18000,fo=T>23300?1-fi(23300,800,T):1;
    pill(W/2,30,'PASSO 3',fi(0,500,lt)*fo);
    ctx.globalAlpha=fi(200,500,lt)*fo;txt('Preencha e envie o chamado',W/2,62,16,'#ffffff','center',600);
    ctx.globalAlpha=fi(400,400,lt)*fo;rr(W/2-160,84,320,192,12,'rgba(255,255,255,0.04)','rgba(255,255,255,0.07)');
    [{l:'Nome',v:'Joao Faria',ok:true},{l:'Centro de custo',v:'Financeiro Corporate',ok:true},
     {l:'Descricao',v:'Preciso de novo teclado...'},{l:'Data desejada',v:'28/05/2026'}
    ].forEach((f,i)=>{
      ctx.globalAlpha=fi(500+i*200,380,lt)*fo;
      const fy=100+i*42;
      txt(f.l,W/2-150,fy,10,'rgba(255,255,255,0.4)','left');
      rr(W/2-150,fy+8,300,24,5,f.ok?'rgba(102,19,208,0.3)':'rgba(255,255,255,0.05)','rgba(255,255,255,0.1)');
      txt(f.v,W/2-142,fy+20,11,f.ok?'#c9a0ff':'rgba(255,255,255,0.65)','left');
    });
    ctx.globalAlpha=fi(1900,500,lt)*fo;rr(W/2-60,282,120,26,7,'#6613D0');txt('Enviar chamado',W/2,295,12,'#fff','center',600);
    ctx.globalAlpha=1;
  }

  // CENA 5 — Slack (24-30s)
  if(T>=23600){
    const lt=T-24000;
    pill(W/2,30,'PRONTO!',fi(0,500,lt));
    ctx.globalAlpha=fi(200,500,lt);txt('Acompanhe tudo pelo Slack',W/2,62,16,'#ffffff','center',600);
    person(W/2,H/2+12,1.1,'#6613D0','Voce',fi(350,500,lt));
    bellIcon(W/2+92,H/2-46,fi(600,600,lt));
    checkmark(W/2-78,H/2-46,fi(850,500,lt));
    ctx.globalAlpha=fi(1200,500,lt);
    rr(W/2-132,H/2+78,264,26,7,'rgba(255,107,43,0.2)','rgba(255,107,43,0.4)');
    txt('Chamado concluido! Avalie o atendimento',W/2,H/2+91,11,'rgba(255,107,43,0.9)','center',500);
    ctx.globalAlpha=fi(1700,500,lt);
    rr(W/2-132,H/2+110,264,26,7,'rgba(22,163,74,0.2)','rgba(22,163,74,0.4)');
    txt('Rastreio DHL enviado direto pelo Slack!',W/2,H/2+123,11,'rgba(134,239,172,0.9)','center',500);
    ctx.globalAlpha=fi(2300,600,lt);txt('facilities-api.vercel.app',W/2,H-22,14,'#FF6B2B','center',600);
    ctx.globalAlpha=1;
  }

  document.getElementById('pfill').style.width=Math.min(T/DUR*100,100)+'%';
  document.getElementById('tlbl').textContent=Math.floor(T/1000)+'s / 30s';
}

function loop(ts){
  if(!prev)prev=ts;
  T=Math.min(T+(ts-prev),DUR);prev=ts;draw(T);
  if(T<DUR&&playing)raf=requestAnimationFrame(loop);
  else if(T>=DUR){
    playing=false;window.speechSynthesis?.cancel();
    document.getElementById('ip').style.display='none';
    document.getElementById('ipa').style.display='none';
    document.getElementById('ipr').style.display='block';
    document.getElementById('sub').textContent='\u00a0';
  }
}

function tog(){
  initAudio();
  if(window.speechSynthesis)window.speechSynthesis.getVoices();
  if(T>=DUR){T=0;lastScene=-1;lastSpoken=-1;document.getElementById('sub').textContent='\u00a0';}
  playing=!playing;
  document.getElementById('ip').style.display=playing?'none':'block';
  document.getElementById('ipa').style.display=playing?'block':'none';
  document.getElementById('ipr').style.display='none';
  if(playing){prev=null;raf=requestAnimationFrame(loop);}
  else{cancelAnimationFrame(raf);window.speechSynthesis?.cancel();}
}

function seek(e){
  initAudio();
  const r=e.currentTarget.getBoundingClientRect();
  T=Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*DUR);
  lastScene=-1;lastSpoken=-1;window.speechSynthesis?.cancel();
  document.getElementById('sub').textContent='\u00a0';draw(T);
}

window.addEventListener('load',()=>{if(window.speechSynthesis)window.speechSynthesis.getVoices();draw(0);});
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script>
</body>
</html>
